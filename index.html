<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <div class="logo">
            <h1><b>Formulario de acesso</b></h1>
            <img src = "imagens/logo.jpg" alt="logo" title = "Meu logo pessoal">
        </div>
    </header>




    <form id = "formulario" novalidate>
        <div class="nome">
            <label for = "nome">Nome Completo *</label>
            <input
                type = "text"
                id = "nome"
                name = "nome"
                placeholder="Seu nome completo"
                required
                ninlength="3"
                autocomplete="name"
            >

            <span class = "erro-msg" id = "nome-erro"></span>
            <span class = "certo-msg" id = "nome-certo"></span>
        </div>

        <div class="email">
            <label for = "email">E-mail *</label>
            <input 
                type = "email" 
                id = "email"
                name = "email"
                placeholder="@email.com"
                required
            >
            <span class = "erro-msg" id = "email-erro"></span>
            <span class = "certo-msg" id = "email-certo"></span>
        </div>

        <button type = "submit" disabled>Enviar</button>


    </form>
    <footer>
            <b>
                <p>Copyright: @Fellipe Cavalcante Scotti</p>
                <p>Data: 05/05/2026</p>
            </b>
    </footer>
    <script src = "controle.js"></script>    
</body>
</html>
